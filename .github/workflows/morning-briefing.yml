name: Morning Briefing Email

on:
  schedule:
    - cron: '30 11 * * *'     # 7:30am ET (11:30 UTC) every day
  workflow_dispatch:            # manual trigger from GitHub Actions tab

permissions:
  contents: write               # needed to commit briefing.json back to repo

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run morning briefing scraper
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/morning-briefing.js

      - name: Read Gmail inbox
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: node scripts/gmail-reader.js

      - name: Run Claude advisor
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/claude-advisor.js

      - name: Commit briefing data to repo
        run: |
          git config user.email "noreply@github.com"
          git config user.name "GitHub Actions"
          git add briefing.json
          git diff --staged --quiet || git commit -m "briefing: $(date -u '+%Y-%m-%d') [skip vercel]"
          git push origin main

      - name: Send Telegram morning digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/telegram-morning.js
