name: Alpaca Paper Monitor

on:
  schedule:
    - cron: '45 19 * * 1-5'   # 3:45pm ET (19:45 UTC) Mon–Fri
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Monitor positions and send daily report
        env:
          ALPACA_KEY_ID:     ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
        run: node scripts/alpaca-monitor.js
