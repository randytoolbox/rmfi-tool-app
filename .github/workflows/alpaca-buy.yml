name: Alpaca Paper Buy

on:
  schedule:
    - cron: '35 13 * * 1-5'   # 9:35am ET (13:35 UTC) Mon–Fri
  workflow_dispatch:

jobs:
  buy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Place morning paper trades
        env:
          ALPACA_KEY_ID:     ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: node scripts/alpaca-buy.js
