name: Morning Picks Email

on:
  schedule:
    - cron: '45 11 * * 1-5'   # 7:45am ET (11:45 UTC) Mon–Fri
  workflow_dispatch:            # also allows manual trigger from GitHub Actions tab

jobs:
  send-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Send morning picks email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/morning-picks.js
