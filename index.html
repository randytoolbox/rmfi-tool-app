<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RMFI Tool Library</title>
</head>
<body>

<h2>RMFI Tool Library System</h2>
<p>Loading toolbox automatically...</p>

<input id="fileInput" type="file" />

<script>
document.addEventListener('DOMContentLoaded', function () {
  fetch('./RMFI_Tool_Database_Master_CLEANED_app_ready_PLUS_Series140.csv')
    .then(function (response) {
      if (!response.ok) throw new Error('CSV not found');
      return response.text();
    })
    .then(function (csvText) {
      const fakeFile = new File([csvText], 'RMFI_Tool_Database_Master_CLEANED_app_ready_PLUS_Series140.csv', { type: 'text/csv' });
      const dt = new DataTransfer();
      dt.items.add(fakeFile);

      const input = document.getElementById('fileInput');
      if (input) {
        input.files = dt.files;
        input.dispatchEvent(new Event('change', { bubbles: true }));
      }
    })
    .catch(function (err) {
      console.error('Auto-load failed:', err);
    });
});
</script>

</body>
</html>
